<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Register UI</title>

 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

 
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

 
  <link rel="stylesheet" href="./style7.css">
</head>

<body>

<div class="main-wrapper">

 
  <div class="container">
    <div class="card form-card shadow-sm">
      <div class="row g-0 align-items-center">

        <div class="col-md-5 text-center">
          <img src="./images/Frame 77 (2).png" class="img-fluid illustration">
        </div>

        <div class="col-md-7">
          <div class="card-body">

            <p class="top-text">Unlock your learning potential</p>

            <div class="tabs">
              <button class="active">Login</button>
              <button>Register</button>
            </div>

            <p class="desc">
              Log in to continue your learning journey with Uni.
            </p>

            <form>

              <label>User Name</label>
              <input type="text" class="form-control" placeholder="Enter your user name">

              <label>Password</label>
              <input type="password" class="form-control" placeholder="Enter your user password">

              <div class="d-flex justify-content-between mt-2 small">
                <div>
                  <input type="checkbox"> Remember me
                </div>
                <a href="#">Forgot Password?</a>
              </div>

              <button class="btn btn-outline-orange mt-3">Login</button>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>


 
  <div class="container mt-5" data-aos="fade-up">
    <div class="card form-card shadow-sm">
      <div class="row g-0 align-items-center">

        <div class="col-md-7">
          <div class="card-body">

            <p class="top-text">Unlock your learning potential</p>

            <div class="tabs">
              <button>Login</button>
              <button class="active">Register</button>
            </div>

            <p class="desc">
              Join Uni & start your learning journey today.
            </p>

            <form>

              <label>Email Address</label>
              <input type="email" class="form-control" placeholder="Enter your email">

              <label>User Name</label>
              <input type="text" class="form-control" placeholder="Enter your user name">

              <label>Password</label>
              <input type="password" class="form-control" placeholder="Enter your password">

              <div class="d-flex justify-content-between mt-2 small">
                <div>
                  <input type="checkbox"> Remember me
                </div>
                <a href="#">Forgot Password?</a>
              </div>

              <button class="btn btn-outline-orange mt-3">Register</button>

            </form>
          </div>
        </div>

        <div class="col-md-5 text-center">
          <img src="./images/Frame 77 (3).png" class="img-fluid illustration">
        </div>

      </div>
    </div>
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>

</body>
</html>
